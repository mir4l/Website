<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add friend on GIVU</title>
  <meta name="description" content="Open GIVU to add this friend." />
  <link rel="icon" type="image/png" href="../assets/favicon-givu.png" />
  <link rel="apple-touch-icon" href="../assets/favicon-givu.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="addfriend-page">
    <div class="addfriend-card">
      <img src="../assets/GivuApplogo.png" alt="GIVU" class="addfriend-icon" />
      <h1>Add friend on GIVU</h1>
      <p>Open the GIVU app to add this friend. Make sure you have GIVU installed on your iPhone.</p>
      <a id="openApp" href="givu://addfriend" class="btn btn-primary">Open GIVU</a>
      <p class="addfriend-note">If nothing happens, install or open GIVU manually.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const deepLink = 'givu://addfriend?id=' + encodeURIComponent(id);
    const button = document.getElementById('openApp');
    button.href = deepLink;
    setTimeout(function () { window.location.href = deepLink; }, 450);
  </script>
</body>
</html>
